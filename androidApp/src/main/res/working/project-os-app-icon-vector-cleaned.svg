<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Project-os app icon cleaned</title>
  <desc id="desc">Cleaned vector-only recreation of the Project-os orbital app icon with corrected inner ring edges.</desc>
  <defs>
    <radialGradient id="bg" cx="627" cy="560" r="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081342"/>
      <stop offset="0.56" stop-color="#060D3A"/>
      <stop offset="1" stop-color="#03072F"/>
    </radialGradient>
    <linearGradient id="orbit" x1="435" y1="611" x2="819" y2="611" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7545FF"/>
      <stop offset="0.50" stop-color="#6B59FF"/>
      <stop offset="0.78" stop-color="#27BCFF"/>
      <stop offset="1" stop-color="#15D7EF"/>
    </linearGradient>
    <linearGradient id="cyan" x1="627" y1="332" x2="627" y2="888" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1BCAF6"/>
      <stop offset="1" stop-color="#14B9EC"/>
    </linearGradient>
  </defs>

  <rect width="1254" height="1254" fill="#ffffff"/>
  <rect x="207" y="180" width="841" height="873" rx="108" fill="url(#bg)"/>

  <!-- Outer white orbital arcs -->
  <g fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" shape-rendering="geometricPrecision">
    <path d="M361 759 A313 313 0 0 1 815 377"/>
    <path d="M882 451 A313 313 0 0 1 414 821"/>
  </g>

  <!-- Inner gradient ring rebuilt as a continuous clean circle with masked top/bottom gaps -->
  <g shape-rendering="geometricPrecision">
    <circle cx="627" cy="611" r="199" fill="none" stroke="url(#orbit)" stroke-width="28"/>
    <!-- gap masks to preserve the current shape and remove corrupted transparent edges -->
    <rect x="586" y="400" width="82" height="36" rx="18" fill="#060D3A"/>
    <rect x="586" y="786" width="82" height="36" rx="18" fill="#060D3A"/>
  </g>

  <!-- Orbit nodes -->
  <g shape-rendering="geometricPrecision">
    <circle cx="815" cy="377" r="42" fill="#FFFFFF"/>
    <circle cx="815" cy="377" r="20" fill="#060D3A"/>

    <circle cx="414" cy="821" r="42" fill="#FFFFFF"/>
    <circle cx="414" cy="821" r="20" fill="#060D3A"/>

    <circle cx="445" cy="539" r="47" fill="#6D46FF"/>
    <circle cx="445" cy="539" r="22" fill="#060D3A"/>

    <circle cx="812" cy="659" r="48" fill="#19C9F3"/>
    <circle cx="812" cy="659" r="22" fill="#060D3A"/>
  </g>

  <!-- Center hub -->
  <g shape-rendering="geometricPrecision">
    <circle cx="626" cy="611" r="105" fill="#FFFFFF"/>
    <rect x="526" y="595" width="201" height="32" rx="16" fill="#060D3A"/>
    <circle cx="626" cy="611" r="53" fill="#060D3A"/>
    <circle cx="526" cy="611" r="23" fill="url(#cyan)"/>
    <circle cx="727" cy="611" r="23" fill="url(#cyan)"/>
  </g>

  <!-- Top and bottom cyan dots -->
  <g fill="url(#cyan)" shape-rendering="geometricPrecision">
    <circle cx="626" cy="344" r="12"/>
    <circle cx="626" cy="377" r="12"/>
    <circle cx="626" cy="845" r="12"/>
    <circle cx="626" cy="878" r="12"/>
  </g>
</svg>
